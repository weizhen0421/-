<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat_bot</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f0e8;
        --panel: rgba(255, 252, 247, 0.86);
        --panel-strong: #fffdf8;
        --border: rgba(83, 74, 61, 0.12);
        --text: #2f2923;
        --muted: #6f665d;
        --accent: #a59a8d;
        --accent-strong: #7f7467;
        --bubble-user: #ebe3d7;
        --bubble-bot: #ffffff;
        --shadow: 0 18px 50px rgba(92, 78, 63, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(214, 204, 188, 0.45), transparent 28%),
          radial-gradient(circle at top right, rgba(232, 223, 210, 0.7), transparent 26%),
          linear-gradient(180deg, #f7f3ec 0%, #f2ede4 100%);
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 20px;
      }

      .shell {
        width: min(100%, 1080px);
        min-height: calc(100vh - 40px);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 16px;
        border: 1px solid var(--border);
        border-radius: 32px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 22px 24px 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .mark {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        background: linear-gradient(135deg, #ded4c6, #f8f4ed);
        border: 1px solid rgba(91, 77, 61, 0.12);
        display: grid;
        place-items: center;
        color: var(--accent-strong);
        font-size: 18px;
        font-weight: 700;
      }

      .title-wrap h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .title-wrap p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.52);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8f9b84;
        box-shadow: 0 0 0 4px rgba(143, 155, 132, 0.16);
      }

      .chat {
        padding: 0 18px 0;
        overflow: hidden;
      }

      .chat-window {
        height: 100%;
        border: 1px solid rgba(98, 88, 74, 0.08);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.92));
        overflow: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
      }

      .messages {
        padding: 18px;
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      .message-row {
        display: flex;
        margin-bottom: 14px;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.assistant {
        justify-content: flex-start;
      }

      .bubble {
        max-width: min(72%, 640px);
        padding: 14px 16px 12px;
        border-radius: 22px;
        border: 1px solid rgba(81, 71, 58, 0.08);
        box-shadow: 0 10px 24px rgba(69, 58, 47, 0.04);
        line-height: 1.8;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.user {
        background: var(--bubble-user);
        border-top-right-radius: 10px;
      }

      .bubble.assistant {
        background: var(--bubble-bot);
        border-top-left-radius: 10px;
      }

      .meta {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .message-row.assistant .meta {
        justify-content: flex-start;
      }

      .composer {
        padding: 16px 18px 18px;
        border-top: 1px solid rgba(92, 79, 63, 0.08);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.78));
      }

      .composer-shell {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: end;
        padding: 10px;
        border-radius: 26px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.88);
      }

      textarea {
        width: 100%;
        min-height: 56px;
        max-height: 180px;
        resize: none;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font: inherit;
        line-height: 1.7;
        padding: 16px 16px 14px;
      }

      textarea::placeholder {
        color: #9b9288;
      }

      .icon-button, .send-button {
        height: 56px;
        min-width: 56px;
        border: none;
        border-radius: 18px;
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      }

      .icon-button {
        display: grid;
        place-items: center;
        background: #f4efe8;
        color: var(--accent-strong);
        border: 1px solid rgba(103, 90, 75, 0.1);
      }

      .send-button {
        padding: 0 18px;
        background: #3f3832;
        color: #fff;
        font-size: 14px;
        min-width: 110px;
      }

      .icon-button:hover, .send-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(59, 50, 41, 0.12);
      }

      .icon-button:active, .send-button:active {
        transform: translateY(0);
        box-shadow: none;
      }

      .icon-button[aria-pressed="true"] {
        background: #d6ccb9;
        color: #4f4336;
      }

      .send-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
      }

      .footer-note {
        padding: 0 22px 18px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 780px) {
        body {
          padding: 0;
        }

        .shell {
          min-height: 100vh;
          border-radius: 0;
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
          padding: 18px 16px 0;
        }

        .chat {
          padding: 0 12px;
        }

        .messages {
          padding: 14px;
        }

        .bubble {
          max-width: 92%;
        }

        .composer {
          padding: 12px;
        }

        .composer-shell {
          grid-template-columns: 1fr auto;
          gap: 8px;
        }

        .send-button {
          grid-column: 1 / -1;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="brand">
          <div class="mark">C</div>
          <div class="title-wrap">
            <h1>Chat_bot</h1>
            <p>溫柔、開朗、幽默，並且認真回應每一次對話。</p>
          </div>
        </div>
        <div class="status" id="status">
          <span class="status-dot"></span>
          <span id="statusText">準備就緒</span>
        </div>
      </header>

      <main class="chat">
        <div class="chat-window">
          <div class="messages" id="messages" aria-live="polite"></div>

          <div class="composer">
            <div class="composer-shell">
              <div class="input-wrap">
                <textarea id="input" rows="1" placeholder="請直接輸入訊息，按 Enter 送出，Shift + Enter 換行。"></textarea>
              </div>
              <button class="icon-button" id="micButton" type="button" title="語音輸入" aria-pressed="false">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 14.5C14.21 14.5 16 12.71 16 10.5V6.5C16 4.29 14.21 2.5 12 2.5C9.79 2.5 8 4.29 8 6.5V10.5C8 12.71 9.79 14.5 12 14.5Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M5 10.5C5 14.36 8.14 17.5 12 17.5C15.86 17.5 19 14.36 19 10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M12 17.5V21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                  <path d="M9.5 21H14.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
              </button>
              <button class="send-button" id="sendButton" type="button">送出</button>
            </div>
          </div>
        </div>
      </main>

      <div class="footer-note">
        對話會自動保存到試算表，時間以 24 小時制顯示。
      </div>
    </div>

    <script>
      const state = {
        sessionId: localStorage.getItem('chatbot_session_id') || crypto.randomUUID(),
        messages: [],
        pending: false,
        recognition: null,
        listening: false
      };
      localStorage.setItem('chatbot_session_id', state.sessionId);

      const els = {
        messages: document.getElementById('messages'),
        input: document.getElementById('input'),
        sendButton: document.getElementById('sendButton'),
        micButton: document.getElementById('micButton'),
        statusText: document.getElementById('statusText')
      };

      const initialMessage = {
        role: 'assistant',
        speaker: 'Chat_bot',
        text: '您好，我是 Chat_bot。今天我會陪您聊天，也會盡量把話說得清楚、溫柔又有趣。'
      };

      boot();

      function boot() {
        setupSpeechRecognition();
        bindEvents();
        loadHistory();
      }

      function bindEvents() {
        els.sendButton.addEventListener('click', onSend);
        els.input.addEventListener('keydown', onKeyDown);
        els.input.addEventListener('input', autoResize);
        els.micButton.addEventListener('click', toggleMic);
      }

      function onKeyDown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          onSend();
        }
      }

      function autoResize() {
        els.input.style.height = 'auto';
        els.input.style.height = Math.min(els.input.scrollHeight, 180) + 'px';
      }

      function setStatus(text) {
        els.statusText.textContent = text;
      }

      function setPending(value) {
        state.pending = value;
        els.sendButton.disabled = value;
        els.input.disabled = value && !state.listening;
        els.micButton.disabled = value;
        setStatus(value ? '正在回覆' : '準備就緒');
      }

      function loadHistory() {
        google.script.run
          .withSuccessHandler(function(history) {
            state.messages = Array.isArray(history) ? history.slice() : [];
            const existing = state.messages.length ? state.messages : [initialMessage];
            renderConversation(existing);
            setStatus('已連線');
          })
          .withFailureHandler(function() {
            state.messages = [];
            renderConversation([]);
            setStatus('準備就緒');
          })
          .loadConversation(state.sessionId);
      }

      function renderConversation(history) {
        els.messages.innerHTML = '';
        if (!history || !history.length) {
          renderMessage(initialMessage, true);
          return;
        }
        history.forEach(function(message) {
          renderMessage(message);
        });
        scrollToBottom();
      }

      function renderMessage(message, quiet) {
        const row = document.createElement('div');
        row.className = 'message-row ' + (message.role === 'user' ? 'user' : 'assistant');

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + (message.role === 'user' ? 'user' : 'assistant');
        bubble.textContent = message.text;

        const meta = document.createElement('div');
        meta.className = 'meta';
        const date = message.date || '';
        const time = message.time || '';
        meta.textContent = [date, time].filter(Boolean).join(' ');

        const wrap = document.createElement('div');
        wrap.appendChild(bubble);
        wrap.appendChild(meta);

        row.appendChild(wrap);
        els.messages.appendChild(row);
        if (!quiet) {
          scrollToBottom();
        }
      }

      function scrollToBottom() {
        requestAnimationFrame(function() {
          els.messages.scrollTop = els.messages.scrollHeight;
        });
      }

      function getConversationPayload() {
        return state.messages.map(function(item) {
          return {
            role: item.role,
            text: item.text,
            date: item.date,
            time: item.time
          };
        });
      }

      function onSend() {
        const text = els.input.value.trim();
        if (!text || state.pending) {
          return;
        }

        const userMessage = createLocalMessage('user', '使用者', text);
        state.messages.push(userMessage);
        renderMessage(userMessage);
        els.input.value = '';
        autoResize();
        setPending(true);

        google.script.run
          .withSuccessHandler(function(result) {
            const assistantEntry = result && result.assistantEntry
              ? result.assistantEntry
              : createLocalMessage('assistant', 'Chat_bot', result && result.reply ? result.reply : '抱歉，剛才沒有成功取得回覆。');

            state.messages.push(assistantEntry);
            renderMessage(assistantEntry);
            setPending(false);
            setStatus('已完成');
          })
          .withFailureHandler(function() {
            const fallback = createLocalMessage('assistant', 'Chat_bot', '抱歉，剛才的回覆沒有順利送達，我會再陪您試一次。');
            state.messages.push(fallback);
            renderMessage(fallback);
            setPending(false);
            setStatus('發生狀況');
          })
          .sendMessage({
            sessionId: state.sessionId,
            message: text,
            conversation: getConversationPayload()
          });
      }

      function createLocalMessage(role, speaker, text) {
        const now = new Date();
        return {
          role: role,
          speaker: speaker,
          text: text,
          date: formatDate(now),
          time: formatTime(now)
        };
      }

      function formatDate(date) {
        return new Intl.DateTimeFormat('zh-TW', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }).format(date);
      }

      function formatTime(date) {
        return new Intl.DateTimeFormat('zh-TW', {
          hour: '2-digit',
          minute: '2-digit',
          hour12: false
        }).format(date);
      }

      function setupSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          els.micButton.title = '此瀏覽器不支援語音輸入';
          els.micButton.disabled = true;
          return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
          state.listening = true;
          els.micButton.setAttribute('aria-pressed', 'true');
          setStatus('正在聆聽');
        };

        recognition.onresult = function(event) {
          let transcript = '';
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            transcript += event.results[i][0].transcript;
          }
          const existing = els.input.value.trim();
          els.input.value = existing ? existing + transcript : transcript;
          autoResize();
        };

        recognition.onerror = function() {
          stopListening();
          setStatus('語音輸入已停止');
        };

        recognition.onend = function() {
          stopListening();
          if (!state.pending) {
            setStatus('準備就緒');
          }
        };

        state.recognition = recognition;
      }

      function toggleMic() {
        if (!state.recognition || state.pending) {
          return;
        }

        if (state.listening) {
          state.recognition.stop();
          return;
        }

        try {
          state.recognition.start();
        } catch (error) {
          stopListening();
        }
      }

      function stopListening() {
        state.listening = false;
        els.micButton.setAttribute('aria-pressed', 'false');
      }
    </script>
  </body>
</html>
